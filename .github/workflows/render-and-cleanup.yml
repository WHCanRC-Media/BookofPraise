name: Render and Cleanup

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'lilypond/**'

jobs:
  render:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install LilyPond and rsvg-convert
        run: sudo apt-get update && sudo apt-get install -y lilypond librsvg2-bin

      - name: Determine changed song dirs
        id: changed
        run: |
          DIRS=$(git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD -- lilypond/ \
            | sed 's|/[^/]*$||' | sort -u)
          echo "dirs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIRS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Render changed songs
        run: |
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            song=$(basename "$dir")
            echo "Rendering $song..."
            python3 png2ly/render_ly.py --psalm "$song" || true
          done <<< "${{ steps.changed.outputs.dirs }}"

      - name: Convert SVGs to PNGs
        run: |
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            for svg in "$dir"/*.svg; do
              [ -f "$svg" ] || continue
              png="${svg%.svg}.png"
              rsvg-convert "$svg" -o "$png"
            done
          done <<< "${{ steps.changed.outputs.dirs }}"

      - name: Create render branch and commit images
        run: |
          RENDER_BRANCH="render/${{ github.head_ref }}"
          git checkout -b "$RENDER_BRANCH"
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            git add -f "$dir"/*.svg "$dir"/*.png 2>/dev/null || true
          done <<< "${{ steps.changed.outputs.dirs }}"
          if git diff --cached --quiet; then
            echo "No rendered files to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Render song previews for PR #${{ github.event.pull_request.number }}"
          git push origin "$RENDER_BRANCH" --force

      - name: Collect rendered PNGs
        id: pngs
        run: |
          PNGS=""
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            for png in "$dir"/*.png; do
              [ -f "$png" ] || continue
              PNGS="$PNGS $png"
            done
          done <<< "${{ steps.changed.outputs.dirs }}"
          echo "list=$PNGS" >> "$GITHUB_OUTPUT"

      - name: Post PR comment with previews
        if: steps.pngs.outputs.list != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pngs = `${{ steps.pngs.outputs.list }}`.trim().split(/\s+/).filter(Boolean);
            const branch = `render/${context.payload.pull_request.head.ref}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let body = '## Rendered Previews\n\n';
            let lastSong = '';
            for (const png of pngs) {
              const parts = png.split('/');
              const song = parts[parts.length - 2];
              const verse = parts[parts.length - 1].replace('.png', '');
              if (song !== lastSong) {
                body += `### ${song}\n`;
                lastSong = song;
              }
              const pngUrl = `https://github.com/${owner}/${repo}/raw/${branch}/${png}`;
              body += `**Verse ${verse}**\n![${song} v${verse}](${pngUrl})\n`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: context.payload.pull_request.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Rendered Previews')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: botComment.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: context.payload.pull_request.number, body,
              });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete PR head branch
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: ${{ github.head_ref }}

      - name: Delete render branch
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: render/${{ github.head_ref }}
