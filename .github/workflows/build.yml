name: Build

on:
  push:
    branches: [rustapp, master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 dev libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Assemble distribution
        run: |
          mkdir -p dist
          cp target/release/bop dist/
          cp -r target/release/lilypond-bin dist/
          cp -r target/release/lilypond dist/
          cp -r target/release/photos dist/

      - uses: actions/upload-artifact@v4
        with:
          name: bop-linux
          path: dist/

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkg-config
            unzip

      - name: Build
        run: cargo build --release

      - name: Assemble distribution
        run: |
          mkdir -p dist
          cp target/release/bop.exe dist/
          cp target/release/*.dll dist/
          cp -r target/release/lilypond-bin dist/
          cp -r target/release/lilypond dist/
          cp -r target/release/photos dist/

          # Bundle GDK pixbuf loaders and GTK schemas
          cp -r /$MSYSTEM/lib/gdk-pixbuf-2.0 dist/lib/gdk-pixbuf-2.0 2>/dev/null || true
          mkdir -p dist/share/glib-2.0
          cp -r /$MSYSTEM/share/glib-2.0/schemas dist/share/glib-2.0/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: bop-windows
          path: dist/
