name: Build

on:
  push:
    branches: [rustapp, master]
  pull_request:
    branches: [master]

env:
  LILYPOND_VERSION: "2.24.4"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK4 dev libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Download LilyPond
        run: |
          curl -L -o lilypond.tar.gz \
            "https://gitlab.com/lilypond/lilypond/-/releases/v${LILYPOND_VERSION}/downloads/lilypond-${LILYPOND_VERSION}-linux-x86_64.tar.gz"
          tar xzf lilypond.tar.gz

      - name: Assemble distribution
        run: |
          mkdir -p dist/photos
          cp target/release/bop dist/
          cp -r "lilypond-${LILYPOND_VERSION}" dist/lilypond-bin
          find lilypond -name '*.ly' -o -name 'composer.txt' | while read f; do
            mkdir -p "dist/$(dirname "$f")"
            cp "$f" "dist/$f"
          done
          cp -r photos/ dist/photos/

      - uses: actions/upload-artifact@v4
        with:
          name: bop-linux
          path: dist/

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-pkg-config
            unzip

      - name: Build
        run: cargo build --release

      - name: Download LilyPond
        run: |
          curl -L -o lilypond.zip \
            "https://gitlab.com/lilypond/lilypond/-/releases/v${LILYPOND_VERSION}/downloads/lilypond-${LILYPOND_VERSION}-mingw-x86_64.zip"
          unzip -q lilypond.zip

      - name: Assemble distribution
        run: |
          mkdir -p dist/photos
          cp target/release/bop.exe dist/
          cp -r "lilypond-${LILYPOND_VERSION}" dist/lilypond-bin
          find lilypond -name '*.ly' -o -name 'composer.txt' | while read f; do
            mkdir -p "dist/$(dirname "$f")"
            cp "$f" "dist/$f"
          done
          cp -r photos/ dist/photos/

      - uses: actions/upload-artifact@v4
        with:
          name: bop-windows
          path: dist/
